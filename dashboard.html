<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<div class="dashboard">

  <!-- TOP BAR -->
  <div class="topbar">
    <h2>Dashboard</h2>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>

  <!-- INPUT -->
  <div class="form-box">
    <input id="domainInput" placeholder="Tambah domain">
    <button onclick="addDomain()">Tambah</button>
  </div>

  <!-- LIST -->
  <ul id="list" class="domain-list"></ul>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
